name: Deploy to EC2

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/pythonmania
            git pull origin main
            ./venv/bin/pip install -r requirements.txt
            fuser -k 4567/tcp || true
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export APP_SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"
            nohup ./venv/bin/python app.py > app.log 2>&1 &
            
            # Health check
            echo "Waiting for app to start..."
            sleep 8
            if curl -s -f http://localhost:4567/ > /dev/null; then
              echo "✅ Deployment Successful! App is running."
            else
              echo "❌ Deployment Failed! App is not responding."
              echo "Last 20 lines of app.log:"
              tail -n 20 app.log
              exit 1
            fi
