name: Deploy to EC2

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/pythonmania
            git pull origin main
            ./venv/bin/pip install -r requirements.txt
            fuser -k 4567/tcp || true
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export APP_SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"
            
            echo "--- PRE-FLIGHT CHECK ---"
            ./venv/bin/python -c "import flask, psycopg2; print('Dependencies OK')" || (echo "❌ Dependency Check Failed"; exit 1)
            ./venv/bin/python -c "import psycopg2, os; psycopg2.connect(os.environ['DATABASE_URL']).close(); print('DB Connection OK')" || (echo "❌ DB Connectivity Check Failed"; exit 1)
            
            # Service Configuration (Persistent Auto-restart)
            # Replace placeholders in the service file
            sed -i "s|{{DATABASE_URL}}|${{ secrets.DATABASE_URL }}|g" attendance.service
            sed -i "s|{{APP_SECRET_KEY}}|${{ secrets.APP_SECRET_KEY }}|g" attendance.service

            # Install and reload systemd service
            sudo cp attendance.service /etc/systemd/system/attendance.service
            sudo systemctl daemon-reload
            sudo systemctl enable attendance
            sudo systemctl restart attendance

            # Health check
            check_health() {
              echo "Waiting 10 seconds for service to stabilize..."
              sleep 10
              curl -s -f http://localhost:4567/ > /dev/null
            }

            if check_health; then
              echo "✅ Deployment Successful! Service is active and persistent."
            else
              echo "❌ Health Check Failed. Inspecting logs..."
              sudo systemctl status attendance --no-pager
              tail -n 100 error.log
              exit 1
            fi
