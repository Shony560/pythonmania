<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('/static/images/premium_bg.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .login-card { 
            max-width: 400px; width: 100%; padding: 2.5rem; border-radius: 24px; 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        /* Italian Style & Version Corner */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        
        .version-corner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(45, 52, 54, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .italian-name {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #008C45 0%, #F4F5F0 50%, #CD212A 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }
        .header-container {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="version-corner">
        (v2kafka2026)
    </div>
    
    <div class="d-flex flex-column align-items-center">
        <div class="header-container">
            <h1 class="italian-name">Shony</h1>
        </div>
        <div class="login-card">
        <h3 class="text-center mb-4 text-primary fw-bold">Attendance Login</h3>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Sign In</button>
        </form>
        <div class="mt-4 text-center">
            <p class="text-secondary small mb-1">Don't have an account?</p>
            <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-sm w-100 fw-bold rounded-pill">Create New Account</a>
        </div>
        <div class="mt-4 text-center text-secondary small pt-3 border-top">
            <p class="mb-0">Demo Accounts:</p>
            <span class="badge bg-light text-dark border">user1 / pass1</span>
            <span class="badge bg-light text-dark border">user2 / pass2</span>
        </div>
    </div>
</body>
</html>
