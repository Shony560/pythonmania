<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Attendance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: url('/static/images/premium_bg.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;
            color: #2d3436;
            margin: 0;
        }
        .register-card { 
            max-width: 450px; width: 100%; padding: 2.5rem; border-radius: 24px; 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .form-control { border-radius: 12px; background: rgba(255, 255, 255, 0.9); }
        .btn-primary { border-radius: 12px; background: #667eea; border: none; }
        .btn-primary:hover { background: #5a67d8; }
        
        /* Italian Style & Version Corner */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        
        .version-corner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(45, 52, 54, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .italian-name {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #008C45 0%, #F4F5F0 50%, #CD212A 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>
    <div class="version-corner">
        <span class="italian-name" style="font-size: 1.1rem; margin-right: 8px;">Shony</span>
        (v2kafka2026)
    </div>
    
    <div class="d-flex flex-column align-items-center">
        <h1 class="italian-name">Shony</h1>
        <div class="register-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="fw-bold text-primary mt-2">Create Account</h3>
            <p class="text-muted">Join our attendance system</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold uppercase">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold uppercase">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Create password" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold uppercase">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" name="confirm_password" class="form-control border-start-0 ps-0" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">Register Now</button>
            <div class="text-center">
                <span class="text-muted small">Already have an account?</span>
                <a href="{{ url_for('login') }}" class="text-primary small fw-bold text-decoration-none ms-1">Login here</a>
            </div>
        </form>
    </div>
</body>
</html>
