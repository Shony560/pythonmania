<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Attendance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background-color: #000;
            display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;
            color: #f5f5f5;
            margin: 0;
            overflow: hidden;
        }
        .register-card { 
            max-width: 450px; width: 100%; padding: 2.5rem; border-radius: 24px; 
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            color: #fff;
            z-index: 10;
        }
        .form-control { border-radius: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .input-group-text { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        .btn-primary { border-radius: 12px; background: #008c45; border: none; }
        .btn-primary:hover { background: #00753a; }
        
        /* Italian Style & Version Corner */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        
        .version-corner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(45, 52, 54, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <!-- Vanta.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.rings.min.js"></script>
</head>
<body id="vanta-bg">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            VANTA.RINGS({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0x008c45,
                backgroundColor: 0x0
            })
        });
    </script>
    
    <div class="version-corner">
        (v2kafka2026)
    </div>
    
    <div class="d-flex flex-column align-items-center">
        <div class="register-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="fw-bold text-primary mt-2">Create Account</h3>
            <p class="text-muted">Join our attendance system</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold uppercase">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold uppercase">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Create password" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold uppercase">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" name="confirm_password" class="form-control border-start-0 ps-0" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3">Register Now</button>
            <div class="text-center">
                <span class="text-muted small">Already have an account?</span>
                <a href="{{ url_for('login') }}" class="text-primary small fw-bold text-decoration-none ms-1">Login here</a>
            </div>
        </form>
    </div>
</body>
</html>
